name: Team sign-up
description: Submit your GitHub username to be added to your assigned team in the course organization.
title: "Team sign-up: "
labels: ["team-signup"]
body:
  - type: markdown
    attributes:
      value: |
        Your team is looked up automatically from the course roster — you don't choose it yourself. Submitting this adds you to it within a minute or two; you'll get a GitHub notification/email inviting you to the team. **You must accept that invite before you have access.**

        Not listed yet? Your instructor hasn't added you to the roster — contact them rather than guessing a team.
  - type: input
    id: github_username
    attributes:
      label: Your GitHub username
      description: Not your name or email — your exact GitHub username (top-right avatar menu on github.com shows it).
      placeholder: octocat
    validations:
      required: true
