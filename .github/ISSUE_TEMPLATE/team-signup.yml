name: Team sign-up
description: Submit your GitHub username so your instructor can add you to your team.
title: "Team sign-up: "
labels: ["team-signup"]
body:
  - type: markdown
    attributes:
      value: |
        Your instructor reviews this and assigns your team manually — it's not instant. Once they do, you'll get a GitHub notification/email inviting you to the team. **You must accept that invite before you have access.**
  - type: input
    id: email
    attributes:
      label: Your email
      description: Whatever email your instructor knows you by (e.g. from team formation) — helps them recognize who you are.
      placeholder: jane.smith@hs-kempten.de
    validations:
      required: true
  - type: input
    id: github_username
    attributes:
      label: Your GitHub username
      description: Not your name or email — your exact GitHub username (top-right avatar menu on github.com shows it).
      placeholder: octocat
    validations:
      required: true
