name: Add student to team

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  add-to-team:
    if: contains(github.event.issue.labels.*.name, 'team-signup')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Look up team in roster, add to team, reply
        uses: actions/github-script@v7
        with:
          # Needs an org-admin personal access token, not the default GITHUB_TOKEN,
          # since adding someone to a team is an organization-level permission.
          # See "For instructors" in exercises/en/assignment-overview.md for setup.
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || "";

            const usernameMatch = body.match(/###\s*Your GitHub username\s*\n+\s*([^\s\n]+)/i);
            if (!usernameMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "⚠️ Could not read a username from this form. Please edit the issue to fill it in, or contact your instructor.",
              });
              return;
            }
            const username = usernameMatch[1].replace(/^@/, "").trim().toLowerCase();

            // Roster is the single source of truth for who belongs to which team --
            // students never get to pick their own team, only submit their username.
            const rosterPath = '.github/team-roster.csv';
            const rosterLines = fs.readFileSync(rosterPath, 'utf8').split('\n');

            let team = null;
            for (const line of rosterLines) {
              const trimmed = line.trim();
              if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('github_username')) continue;
              const [rowUsername, rowTeam] = trimmed.split(',').map(s => s.trim());
              if (rowUsername && rowUsername.toLowerCase() === username) {
                team = rowTeam;
                break;
              }
            }

            if (!team) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ "${username}" isn't in the team roster yet. Your instructor needs to add you before you can be added to a team — contact them, then reopen this issue or submit a new one.`,
              });
              return;
            }

            try {
              await github.rest.teams.addOrUpdateMembershipForUserInOrg({
                org: context.repo.owner,
                team_slug: team,
                username: username,
                role: "member",
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ @${username} added to team **${team}** (per the roster). Check your GitHub notifications/email for the invite — you must accept it before you have access to anything.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed",
              });
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ Found "${username}" in the roster (team **${team}**), but adding you failed (${e.message}). Most likely "${username}" is misspelled, or the team "${team}" doesn't exist yet. Contact your instructor.`,
              });
            }
