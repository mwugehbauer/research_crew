name: Add student to team

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  # Fires once, when the sign-up form is submitted: just a heads-up for the
  # instructor, no GitHub team membership changes happen here.
  notify-new-signup:
    if: github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'team-signup')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "📋 New sign-up. Instructor: figure out which team this is, then add the label `team:<team-slug>` (e.g. `team:team-a`) to this issue — that adds them automatically.",
            });

  # Fires when the instructor applies a `team:<slug>` label, e.g. `team:team-a`.
  # That label *is* the decision -- whichever team-slug follows the prefix is
  # exactly the team the student gets added to.
  add-to-team:
    if: github.event.action == 'labeled' && startsWith(github.event.label.name, 'team:') && contains(github.event.issue.labels.*.name, 'team-signup')
    runs-on: ubuntu-latest
    steps:
      - name: Parse form, add to team, reply
        uses: actions/github-script@v7
        with:
          # Needs an org-admin personal access token, not the default GITHUB_TOKEN,
          # since adding someone to a team is an organization-level permission.
          # See "For instructors" in exercises/en/assignment-overview.md for setup.
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const body = context.payload.issue.body || "";
            const usernameMatch = body.match(/###\s*Your GitHub username\s*\n+\s*([^\s\n]+)/i);

            if (!usernameMatch) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "⚠️ Could not read a GitHub username from this form. Edit the issue to fill it in, then re-apply the team label.",
              });
              return;
            }

            const username = usernameMatch[1].replace(/^@/, "").trim().toLowerCase();
            const team = context.payload.label.name.replace(/^team:/, "").trim();

            try {
              await github.rest.teams.addOrUpdateMembershipForUserInOrg({
                org: context.repo.owner,
                team_slug: team,
                username: username,
                role: "member",
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `✅ @${username} added to team **${team}**. Check your GitHub notifications/email for the invite — you must accept it before you have access to anything.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed",
              });
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ Could not add "${username}" to team "${team}" (${e.message}). Most likely the username is misspelled, or that team doesn't exist yet. Fix and re-apply the label to retry.`,
              });
            }
